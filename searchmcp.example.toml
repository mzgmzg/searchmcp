# SearchMCP 配置文件示例
# 复制为 searchmcp.toml 并根据需要修改
# 环境变量优先级高于配置文件

[server]
# 传输方式: stdio / sse / streamable-http
transport = "stdio"
# HTTP 监听地址（仅 sse / streamable-http 模式生效）
host = "127.0.0.1"
# HTTP 监听端口
port = 8000
# API Key 鉴权（仅 HTTP 模式生效，不设置则无鉴权）
api_key = ""

[search]
# HTTP 代理地址，如 http://127.0.0.1:7890
proxy = ""
# SearXNG 自部署元搜索引擎地址，设置即激活
searxng_base_url = ""
# 各搜索后端的 API Key，设置即激活
brave_api_key = ""
tavily_api_key = ""
bing_api_key = ""
